!DOCTYPE html>
<html>
<head>
    <title>To-Do List pantallas de referencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Tasks</h1>

    <div class="container">
        <input type="text" id="taskInput" placeholder="Write a new task...">
        <button id="addBtn">Add</button>
    </div>

    <p id="emptyMessage">No tasks yet</p>

    <ul id="taskList"></ul>

    <script src="app.js"></script>
</body>
</html>
